name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel in-flight runs for the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1 — fast feedback, no cluster needed
  # Lints the chart and validates that all three environment overlays render
  # to parseable YAML without a running cluster.
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Helm lint & template render
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.16.4'

      - name: Lint all environments
        run: |
          for env in dev qa prod; do
            echo "── helm lint $env ──────────────────────────────"
            helm lint ./helm \
              --values helm/values.yaml \
              --values "helm/values-${env}.yaml" \
              --strict
          done

      - name: Render and validate YAML for all environments
        run: |
          for env in dev qa prod; do
            echo "-- template $env --"
            helm template envoy-sidecar ./helm \
              --values helm/values.yaml \
              --values "helm/values-${env}.yaml" \
              --set podA.image=testapp:latest \
              --set podB.image=testapp:latest \
              --set mocks.image=testapp:latest \
            | python3 -c "import sys,yaml; n=sum(1 for d in yaml.safe_load_all(sys.stdin) if d); print(n,'manifests OK')"
          done

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2 — full integration test, once per mode
  # Spins up a real Kind cluster, deploys the stack, waits for every pod to
  # become Ready, then runs the mode's smoke test. Each mode runs in its own
  # isolated cluster in parallel.
  # ───────────────────────────────────────────────────────────────────────────
  integration:
    name: Integration test (${{ matrix.mode }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        mode: [dev, qa, prod]

    steps:
      - uses: actions/checkout@v4

      # ── tool installation ──────────────────────────────────────────────────
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.16.4'

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kind
        run: |
          curl -fsSLo /tmp/kind \
            https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x /tmp/kind && sudo mv /tmp/kind /usr/local/bin/kind

      - name: Install helmfile
        run: |
          curl -fsSLo /tmp/helmfile.tar.gz \
            https://github.com/helmfile/helmfile/releases/download/v0.162.0/helmfile_0.162.0_linux_amd64.tar.gz
          tar xzf /tmp/helmfile.tar.gz -C /tmp helmfile
          sudo mv /tmp/helmfile /usr/local/bin/helmfile

      - name: Install helm-diff plugin
        # Version must be specified WITHOUT the v prefix — helm matches the tag string exactly.
        # 3.9.9: last release before platformHooks was added to plugin.yaml,
        # which Helm 3.16+ rejects as an unknown field.
        run: |
          rm -rf ~/.local/share/helm/plugins/helm-diff ~/.cache/helm/plugins/helm-diff
          helm plugin install https://github.com/databus23/helm-diff --version 3.9.9

      # ── cluster ───────────────────────────────────────────────────────────
      - name: Create Kind cluster
        run: kind create cluster --config kind-config.yaml --wait 60s

      - name: Install Calico CNI
        run: |
          kubectl apply -f \
            https://raw.githubusercontent.com/projectcalico/calico/v3.27.3/manifests/calico.yaml
          kubectl rollout status daemonset/calico-node \
            -n kube-system --timeout=120s

      # ── deploy ────────────────────────────────────────────────────────────
      # make <mode>: build → kind load → generate certs + secrets → helmfile apply
      - name: Deploy ${{ matrix.mode }} stack
        run: make ${{ matrix.mode }}

      # ── smoke test ────────────────────────────────────────────────────────
      - name: Smoke test
        run: make test-${{ matrix.mode }}

      # ── diagnostics (always runs so failures are readable) ────────────────
      - name: Pod status
        if: always()
        run: |
          echo "════ pods (all namespaces) ════════════════════════════"
          kubectl get pods -A -o wide
          echo ""
          echo "════ events (apps + gateway) ══════════════════════════"
          kubectl get events -n apps --sort-by='.lastTimestamp' | tail -20 || true
          kubectl get events -n gateway --sort-by='.lastTimestamp' | tail -20 || true

      # On failure, trace pod-a's endpoints with timing and dump every tier's logs.
      - name: Diagnose smoke failure
        if: failure()
        run: |
          echo "════ per-endpoint curl from client via f5 (pod-a paths) ════"
          for path in /health /call-b /call-kafka /call-llm /call-internal /call-blocked; do
            kubectl exec -n client client -- sh -c "
              curl -sS -o /dev/null -w '$path -> HTTP %{http_code} in %{time_total}s\n' \
                --max-time 10 \
                --cert /certs/client.crt --key /certs/client.key --cacert /certs/ca.crt \
                https://f5-sim.f5.svc.cluster.local$path \
                || echo '$path -> curl exit '\$?" || true
          done

          echo ""
          echo "════ logs: gateway ════════════════════════════════════"
          kubectl logs -n gateway -l app=gateway --tail=60 2>/dev/null || true
          for entry in "f5:f5-sim" "haproxy:haproxy" "apps:pod-a" "apps:pod-b"; do
            ns="${entry%%:*}"; app="${entry##*:}"
            echo ""
            echo "════ logs: $app (ns=$ns) ═══════════════════════════════"
            kubectl logs -n "$ns" -l "app=$app" --all-containers --prefix --tail=50 2>/dev/null || true
          done
