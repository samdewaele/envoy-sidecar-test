{{- if .Values.client.enabled }}
# Long-running client pod — exec into it to fire test requests.
# kubectl exec -n client -it client -- /bin/sh
apiVersion: v1
kind: Pod
metadata:
  name: client
  namespace: {{ .Values.namespaces.client }}
  labels:
    app: client
spec:
  restartPolicy: Always
  containers:
    - name: client
      image: {{ .Values.global.imageRegistry }}{{ .Values.client.image }}
      imagePullPolicy: {{ .Values.global.imagePullPolicy }}
      command: ["sh", "-c", "while true; do sleep 3600; done"]
      volumeMounts:
        - name: client-certs
          mountPath: /certs
          readOnly: true
      env:
        - name: F5_HOST
          value: "f5-sim.{{ .Values.namespaces.f5 }}.svc.{{ .Values.global.clusterDomain }}"
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 32Mi
  volumes:
    - name: client-certs
      secret:
        secretName: {{ .Values.client.tls.secretName }}
{{- end }}
