{{- if .Values.networkPolicy.enabled }}
{{/*
Pod A NetworkPolicy (namespace: apps).
Ingress: only HAProxy (haproxy namespace) may reach the Envoy inbound port.
Egress:  Pod B (same namespace, direct) + the egress gateway + DNS.
         Pod A can NOT reach kafka/llm/etc directly — only via the gateway.
*/}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pod-a-netpol
  namespace: {{ .Values.namespaces.apps }}
  labels:
    app: pod-a
spec:
  podSelector:
    matchLabels:
      app: pod-a
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.haproxy }}
      ports:
        - port: {{ .Values.envoy.ports.inbound }}
          protocol: TCP

  egress:
    # Cluster DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    # Pod B — direct east-west (same namespace)
    - to:
        - podSelector:
            matchLabels:
              app: pod-b
      ports:
        - port: {{ .Values.envoy.ports.inbound }}
          protocol: TCP

    # Egress gateway — the ONLY path to external systems
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.gateway }}
          podSelector:
            matchLabels:
              app: {{ .Values.gateway.name }}
      ports:
        - port: {{ .Values.gateway.ports.listen }}
          protocol: TCP
{{- end }}
