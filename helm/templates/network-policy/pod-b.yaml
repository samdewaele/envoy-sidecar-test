{{- if .Values.networkPolicy.enabled }}
{{/*
Pod B NetworkPolicy (namespace: apps).
Ingress: only Pod A (same namespace) may reach the Envoy inbound port.
Egress:  the egress gateway + DNS only. Pod B reaches kafka/internal-api
         exclusively through the gateway.
*/}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pod-b-netpol
  namespace: {{ .Values.namespaces.apps }}
  labels:
    app: pod-b
spec:
  podSelector:
    matchLabels:
      app: pod-b
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: pod-a
      ports:
        - port: {{ .Values.envoy.ports.inbound }}
          protocol: TCP

  egress:
    # Cluster DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    # Egress gateway — the ONLY path to external systems
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.gateway }}
          podSelector:
            matchLabels:
              app: {{ .Values.gateway.name }}
      ports:
        - port: {{ .Values.gateway.ports.listen }}
          protocol: TCP
{{- end }}
