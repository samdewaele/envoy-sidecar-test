{{- if and .Values.networkPolicy.enabled .Values.gateway.enabled }}
{{/*
Egress gateway NetworkPolicy (namespace: gateway).
Ingress: only the apps namespace (the pod sidecars) may reach the egress port.
Egress:  only the explicitly allowed target namespaces + DNS.
         blocked-mock's namespace is intentionally absent — defence in depth on
         top of the gateway having no route for it.
*/}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-netpol
  namespace: {{ .Values.namespaces.gateway }}
  labels:
    app: {{ .Values.gateway.name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.gateway.name }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.apps }}
      ports:
        - port: {{ .Values.gateway.ports.listen }}
          protocol: TCP

  egress:
    # Cluster DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- range .Values.gateway.routes }}
    # {{ .sni }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .upstreamNamespace }}
      ports:
        - port: {{ .upstreamPort }}
          protocol: TCP
{{- end }}
{{- end }}
