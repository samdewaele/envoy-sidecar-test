{{/*
All mock targets use the same testapp image in "mock" role.
All serve TLS/mTLS — certs are mounted from the mock-certs secret.
Envoy's outbound clusters connect to them over mTLS.
*/}}

{{- define "mock.tlsEnv" -}}
- name: LISTEN_ADDR
  value: "0.0.0.0"
- name: TLS_CERT
  value: {{ $.Values.mocks.tls.mountPath }}/tls.crt
- name: TLS_KEY
  value: {{ $.Values.mocks.tls.mountPath }}/tls.key
- name: TLS_CA
  value: {{ $.Values.mocks.tls.mountPath }}/ca.crt
{{- end }}

{{- define "mock.tlsVolumeMount" -}}
- name: mock-certs
  mountPath: {{ $.Values.mocks.tls.mountPath }}
  readOnly: true
{{- end }}

{{- define "mock.tlsVolume" -}}
- name: mock-certs
  secret:
    secretName: {{ $.Values.mocks.tls.secretName }}
{{- end }}

{{- define "mock.securityContext" -}}
securityContext:
  runAsNonRoot: true
  {{- if .Values.global.appUID }}
  runAsUser: {{ .Values.global.appUID }}
  {{- end }}
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
{{- end }}

# ── Kafka mock (TCP echo over TLS) ────────────────────────────────────────────
{{- if .Values.mocks.kafka.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-mock
  namespace: {{ .Values.global.namespace }}
  labels:
    app: kafka-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-mock
  template:
    metadata:
      labels:
        app: kafka-mock
    spec:
      containers:
        - name: mock
          image: {{ .Values.global.imageRegistry }}{{ .Values.mocks.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: APP_ROLE
              value: "mock"
            - name: APP_PORT
              value: "8080"
            - name: TCP_PORT
              value: {{ .Values.mocks.kafka.tcpPort | quote }}
            {{- include "mock.tlsEnv" . | nindent 12 }}
          ports:
            - containerPort: 8080
              name: https
            - containerPort: {{ .Values.mocks.kafka.tcpPort }}
              name: tcp-tls
          volumeMounts:
            {{- include "mock.tlsVolumeMount" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 5
          {{ include "mock.securityContext" . | nindent 10 }}
      volumes:
        {{- include "mock.tlsVolume" . | nindent 8 }}
---
{{- end }}

