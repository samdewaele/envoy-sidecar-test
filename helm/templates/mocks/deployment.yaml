{{/*
All mock targets use the same testapp image in "mock" role.
Each gets its own Deployment + Service so DNS names match what Envoy clusters reference.
*/}}

# ── Kafka mock (TCP echo) ─────────────────────────────────────────────────────
{{- if .Values.mocks.kafka.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-mock
  namespace: {{ .Values.global.namespace }}
  labels:
    app: kafka-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-mock
  template:
    metadata:
      labels:
        app: kafka-mock
    spec:
      containers:
        - name: mock
          image: {{ .Values.global.imageRegistry }}{{ .Values.mocks.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: APP_ROLE
              value: "mock"
            - name: APP_PORT
              value: "8080"          # HTTP health endpoint
            - name: TCP_PORT
              value: {{ .Values.mocks.kafka.tcpPort | quote }}
          ports:
            - containerPort: 8080
            - containerPort: {{ .Values.mocks.kafka.tcpPort }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
{{- end }}

