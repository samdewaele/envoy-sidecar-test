# =============================================================================
# Base values — apply to all environments.
# Override per-environment in values-dev.yaml / values-qa.yaml / values-prod.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# Global
# ---------------------------------------------------------------------------
global:
  imageRegistry: ""          # prefix for all images, e.g. "registry.mybank.internal/"
  imagePullPolicy: IfNotPresent
  clusterDomain: cluster.local

  # Container UIDs.
  # Set to ~ (null) on OpenShift when the restricted SCC is active — it
  # assigns UIDs from the namespace range and rejects a fixed runAsUser.
  # runAsNonRoot: true is always enforced regardless of this setting.
  envoyUID: 1337    # conventional Envoy UID; ignored on OpenShift
  appUID:   65534   # nobody; ignored on OpenShift

# ---------------------------------------------------------------------------
# Namespaces — one per component, to mirror a real multi-tenant cluster.
# Every component's Service is reachable cross-namespace at
#   <service>.<namespace>.svc.<clusterDomain>
# ---------------------------------------------------------------------------
namespaces:
  f5:          f5
  haproxy:     haproxy
  apps:        apps          # pod-a, pod-b + their Envoy sidecars
  gateway:     gateway       # the shared egress gateway
  client:      client        # test client
  kafka:       kafka
  internalApi: internal-api
  llmGateway:  llm-gateway
  blocked:     blocked

# ---------------------------------------------------------------------------
# Envoy sidecar — shared settings
# ---------------------------------------------------------------------------
envoy:
  # mode controls inbound RBAC enforcement level:
  #   dev  — sidecar present, inbound RBAC filter not loaded
  #   qa   — mTLS on, inbound whitelist evaluated but violations only LOGGED
  #   prod — mTLS on, inbound whitelist hard-enforced, violations DROPPED
  # mTLS is ALWAYS on in every mode. Egress authorization is enforced at the
  # gateway (by client-cert CN), not in the sidecar.
  mode: dev

  image: envoyproxy/envoy:v1.31-latest

  ports:
    inbound: 8443          # Envoy listens here; exposed as the pod's service port
    appPort: 9090          # App container listens here (localhost only)
    admin: 9901            # Envoy admin interface (localhost only — never exposed)
    health: 9902           # plain-HTTP health listener on 0.0.0.0 for kubelet probes

    # Outbound localhost listeners — the app connects to these. Pod-B is a
    # direct east-west hop; the rest are routed to the egress gateway by SNI.
    outboundPodB:      19080   # direct sidecar→sidecar to Pod B
    outboundKafka:     19092   # → gateway (SNI=kafka)
    outboundLLM:       14443   # → gateway (SNI=llm-gateway)
    outboundInternal:  19094   # → gateway (SNI=internal-api)
    outboundBlocked:   19999   # → gateway (SNI=blocked) — no route, used to test blocking

  # Per-pod identity certs. Pod A and Pod B now use DISTINCT certs so the
  # gateway can authorize egress by client-cert CN.
  tls:
    secretNamePodA: envoy-certs-pod-a   # tls.crt (CN=pod-a), tls.key, ca.crt
    secretNamePodB: envoy-certs-pod-b   # tls.crt (CN=pod-b), tls.key, ca.crt
    mountPath: /certs

  # JWT injection — Envoy signs every inbound request with an RS256 JWT so the
  # app container can verify the request really came through the sidecar.
  jwt:
    enabled: true
    tokenSecretName: envoy-jwt-token
    pubkeySecretName: app-jwt-pubkey
    tokenMountPath: /jwt
    pubkeyMountPath: /jwt-pubkey
    headerName: X-Envoy-Internal-JWT

# ---------------------------------------------------------------------------
# Egress gateway — a standalone Envoy that performs egress for the pods.
#
#   pod sidecar ──mTLS (SNI=<target>)──▶ gateway ──re-encrypt mTLS──▶ target
#
# The gateway is the single egress policy point. It blocks two ways:
#   - no route:  SNI has no matching filter chain (e.g. "blocked")
#   - CN denied: the calling pod's client-cert CN is not authorized for that SNI
# ---------------------------------------------------------------------------
gateway:
  enabled: true
  name: gateway
  replicas: 1
  image: envoyproxy/envoy:v1.31-latest

  ports:
    listen: 8443           # mTLS ingress from pod sidecars
    admin: 9901            # localhost only
    health: 9902           # 0.0.0.0 for kubelet probes

  service:
    port: 8443

  tls:
    secretName: gateway-certs   # tls.crt (CN=gateway), tls.key, ca.crt
    mountPath: /certs

  # Routing + per-CN authorization table.
  # Each entry: an SNI the pods address, the real upstream it maps to, and the
  # set of client-cert CNs allowed to use it. "blocked" is intentionally absent.
  routes:
    - sni: kafka
      upstreamHost: kafka-mock
      upstreamNamespace: kafka
      upstreamPort: 9092
      allowedCNs: ["pod-a", "pod-b"]
    - sni: llm-gateway
      upstreamHost: llm-gateway-mock
      upstreamNamespace: llm-gateway
      upstreamPort: 8080
      allowedCNs: ["pod-a"]
    - sni: internal-api
      upstreamHost: internal-api-mock
      upstreamNamespace: internal-api
      upstreamPort: 8080
      allowedCNs: ["pod-b"]

# ---------------------------------------------------------------------------
# f5-sim — nginx simulating the F5 BIG-IP
#   test-client ──mTLS──▶ f5-sim:443 ──mTLS+X-SSL-Client-CN──▶ haproxy:8443
# ---------------------------------------------------------------------------
f5Sim:
  enabled: true
  image: nginx:1.27-alpine
  replicas: 1

  service:
    type: NodePort
    port: 443
    nodePort: 30443      # access via https://localhost:30443 from the host machine

  tls:
    secretName: f5-sim-certs

# ---------------------------------------------------------------------------
# HAProxy — re-encrypts from f5-sim toward Pod A's Envoy
#   f5-sim ──mTLS──▶ haproxy:8443 ──mTLS──▶ pod-a-service.apps:8443
# ---------------------------------------------------------------------------
haproxy:
  enabled: true
  image: haproxy:2.9-alpine
  replicas: 1
  port: 8443

  tls:
    secretName: haproxy-certs

# ---------------------------------------------------------------------------
# Pod A — egress allowed to: pod-b (direct), kafka, llm-gateway
# ---------------------------------------------------------------------------
podA:
  name: pod-a
  replicas: 1
  image: ""

  service:
    port: 8443

  inbound:
    allowedSourceCIDRs:
      - "0.0.0.0/0"   # DEV default — tightened in qa/prod values
    allowedClientCNs:
      - "test-client"
    cnHeader: "X-SSL-Client-CN"

  outbound:
    podB:
      address: pod-b-service   # resolved to pod-b-service.<apps-ns>.svc.<domain>
      port: 8443

# ---------------------------------------------------------------------------
# Pod B — egress allowed to: kafka, internal-api (all via the gateway)
# ---------------------------------------------------------------------------
podB:
  name: pod-b
  replicas: 1
  image: ""

  service:
    port: 8443

  inbound:
    allowedSourceCIDRs:
      - "0.0.0.0/0"   # DEV default
    allowedClientCNs:
      - "pod-a"
    cnHeader: "X-SSL-Client-CN"

# ---------------------------------------------------------------------------
# NetworkPolicy
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: true

# ---------------------------------------------------------------------------
# Mock targets — each in its own namespace
# ---------------------------------------------------------------------------
mocks:
  image: ""   # same testapp image, APP_ROLE=mock

  tls:
    secretName: mock-certs
    mountPath: /certs

  kafka:
    enabled: true
    tcpPort: 9092

  llmGateway:
    enabled: true
    httpPort: 8080

  internalAPI:
    enabled: true
    httpPort: 8080

  blocked:
    enabled: true
    httpPort: 8080

# ---------------------------------------------------------------------------
# Test client
# ---------------------------------------------------------------------------
client:
  enabled: true
  image: curlimages/curl:8.7.1
  tls:
    secretName: client-certs
